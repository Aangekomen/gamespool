<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#171a56">
<title>Offline · FlexiComp</title>
<style>
    body { margin: 0; min-height: 100vh; background: #0f172a; color: #f1f5f9;
           font-family: -apple-system, system-ui, sans-serif; display: flex;
           align-items: center; justify-content: center; padding: 2rem; }
    .card { max-width: 380px; text-align: center; }
    h1 { margin: 0 0 .5rem; font-size: 1.5rem; }
    p { color: #94a3b8; margin: 0 0 1.5rem; line-height: 1.5; }
    button { background: #35b782; color: white; border: 0; padding: .9rem 1.5rem;
             border-radius: .6rem; font-weight: 700; font-size: 1rem; cursor: pointer; }
</style>
</head>
<body>
    <div class="card">
        <h1>Geen verbinding</h1>
        <p>FlexiComp kan even niet bij de server. Probeer het zo opnieuw.</p>
        <button onclick="location.reload()">Opnieuw proberen</button>
    </div>
</body>
</html>
